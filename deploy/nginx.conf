# ── AnfieldVoice — Nginx Reverse Proxy with SSL Termination ─────────────────
# Place this in /etc/nginx/sites-available/anfieldvoice and symlink to
# /etc/nginx/sites-enabled/.
#
# Quick setup:
#   sudo ln -sf /etc/nginx/sites-available/anfieldvoice /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL certs via Let's Encrypt / certbot:
#   sudo certbot --nginx -d anfieldvoice.example.com
# ──────────────────────────────────────────────────────────────────────────────

upstream anfieldvoice_backend {
    server 127.0.0.1:8000;
    # Add additional upstream servers for horizontal scaling:
    # server 127.0.0.1:8001;
    # server 127.0.0.1:8002;
    keepalive 64;
}

# ── Rate Limit Zones ─────────────────────────────────────────────────────────
# Zone definitions shared across server blocks.
# Use a larger zone (100m) for production with many tenants.

limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;

# ── HTTP → HTTPS Redirect ────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name anfieldvoice.example.com;

    # ── Let's Encrypt / certbot challenge ───────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type text/plain;
    }

    # ── Redirect everything else to HTTPS ────────────────────────────────────
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ─────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name anfieldvoice.example.com;

    # ── SSL Configuration ────────────────────────────────────────────────────
    # Managed by certbot — paths below are for manual/managed setups.
    # certbot --nginx will rewrite these automatically.
    ssl_certificate     /etc/letsencrypt/live/anfieldvoice.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anfieldvoice.example.com/privkey.pem;

    # Modern TLS — Mozilla Intermediate profile
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ─────────────────────────────────────────────────────
    # HSTS (6 months — increase to 31536000 after confirming no issues)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Enable XSS filter in older browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy (relaxed for WebSocket + SPA; tighten for production)
    add_header Content-Security-Policy "
        default-src 'self';
        connect-src 'self' https://anfieldvoice.example.com wss://anfieldvoice.example.com;
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
        font-src 'self';
        frame-ancestors 'none';
        form-action 'self';
        base-uri 'self';
    " always;

    # Disable FLoC / Topics
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/anfieldvoice_access.log;
    error_log  /var/log/nginx/anfieldvoice_error.log;

    # ── Proxy Settings (shared) ──────────────────────────────────────────────
    proxy_http_version 1.1;

    # Buffering — disable for streaming/SSE/WebSocket
    proxy_buffering off;
    proxy_request_buffering off;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Headers forwarded to the backend
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Large body for gate call recordings / media uploads (if applicable)
    client_max_body_size 50m;

    # ── Static / Well-Known ─────────────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type text/plain;
    }

    # ── Health Check ─────────────────────────────────────────────────────────
    location = /health {
        access_log off;
        proxy_pass http://anfieldvoice_backend;
    }

    # ── WebSocket Support ────────────────────────────────────────────────────
    location /ws {
        proxy_pass http://anfieldvoice_backend/ws;

        # WebSocket protocol upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Extended timeouts for persistent connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable buffering (WebSocket must be unbuffered)
        proxy_buffering off;
        proxy_request_buffering off;

        access_log off;
    }

    # ── API General (rate-limited) ───────────────────────────────────────────
    location /api/ {
        proxy_pass http://anfieldvoice_backend;
    }

    # ── Auth Login (aggressive rate limit) ───────────────────────────────────
    location /api/v1/auth/login {
        limit_req zone=auth_login burst=10 nodelay;
        proxy_pass http://anfieldvoice_backend;
    }

    # ── Static Assets (Web Dashboard) ───────────────────────────────────────
    location /static/ {
        proxy_pass http://anfieldvoice_backend;
        proxy_buffering on;
        proxy_cache STATIC;
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── SPA Catch-All (served by FastAPI static files / index.html) ─────────
    location / {
        proxy_pass http://anfieldvoice_backend;

        # Cache HTML responses minimally — SPA needs fresh index.html
        proxy_buffering on;
        proxy_cache STATIC;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }
}

# ── Proxy Cache Configuration ────────────────────────────────────────────────
proxy_cache_path /var/cache/nginx/anfieldvoice levels=1:2 keys_zone=STATIC:10m
                 max_size=1g inactive=24h use_temp_path=off;
